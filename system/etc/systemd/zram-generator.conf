# Overrides the vendor default at /usr/lib/systemd/zram-generator.conf.
#
# This file REPLACES the vendor one rather than merging with it, so
# zram-size has to be restated even though it is unchanged -- leaving it
# out would silently fall back to zram-generator's own built-in default
# of min(ram / 2, 4096), halving the device.
#
# Size stays at Fedora's stock 8G. On 30GiB of RAM that is plenty: with
# no override in place the machine idled at 17GiB available, 6% of swap
# touched, and memory PSI flat at 0.00. Sizing zram at or above physical
# RAM is counterproductive -- the device is backed BY RAM, so an
# oversized one just raises the ceiling on how much RAM swap can consume
# under pressure.
#
# Only the compressor changes. lzo-rle is the upstream default, picked to
# stay cheap on weak CPUs; this is a Zen 5 Ryzen 9, so zstd's better
# ratio is effectively free and buys more capacity at the same RAM cost.

[zram0]
zram-size = min(ram, 8192)
compression-algorithm = zstd
