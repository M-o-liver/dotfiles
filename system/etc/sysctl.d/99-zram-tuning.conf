# Kernel VM tuning for RAM-backed (zram) swap.
#
# Both defaults assume swap lives on a slow block device. This machine's
# only swap is /dev/zram0 -- compressed pages in RAM -- so both are
# mistuned out of the box. See system/etc/systemd/zram-generator.conf for
# the device itself.

# Swap readahead, as a power of two: the default 3 faults in 2^3 = 8 pages
# at a time. That amortises seek cost on a spinning disk. zram has no seek
# cost and decompresses each page individually, so readahead just burns CPU
# decompressing pages nothing asked for. 0 = fault in one page at a time.
vm.page-cluster = 0

# How readily the kernel reclaims anonymous pages instead of page cache.
# The default 60 is calibrated for swap being orders of magnitude slower
# than RAM. Here swap IS RAM, so compressing a cold anon page is far
# cheaper than dropping cache that will have to be re-read from NVMe.
vm.swappiness = 100
