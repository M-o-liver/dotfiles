[General]
# Nord preset for sddm-astronaut-theme — matches the machine theme
# (~/dotfiles/MACHINE.md): bg #2e3440, bg-alt #3b4252, fg #eceff4,
# muted #4c566a, frost cyan #88c0d0, frost blue #81a1c1, red #bf616a.
# Background is the same generated gradient the desktop uses.

ScreenWidth="2560"
ScreenHeight="1600"
ScreenPadding=""

Font="Adwaita Sans"
# System font — the sddm user can't see ~/.local/share/fonts (JetBrainsMono).
FontSize=""
KeyboardSize="0.4"
RoundCorners="12"

Locale=""
HourFormat="HH:mm"
DateFormat="dddd d MMMM"

HeaderText=""

#################### Background ####################

BackgroundPlaceholder=""
Background="Backgrounds/nord-gradient.png"
BackgroundSpeed=""
PauseBackground=""
DimBackground="0.0"
CropBackground="true"
BackgroundHorizontalAlignment="center"
BackgroundVerticalAlignment="center"

#################### Colors ####################

HeaderTextColor="#eceff4"
DateTextColor="#eceff4"
TimeTextColor="#88c0d0"

FormBackgroundColor="#2e3440"
BackgroundColor="#2e3440"
DimBackgroundColor="#2e3440"

LoginFieldBackgroundColor="#3b4252"
PasswordFieldBackgroundColor="#3b4252"
LoginFieldTextColor="#eceff4"
PasswordFieldTextColor="#eceff4"
UserIconColor="#88c0d0"
PasswordIconColor="#88c0d0"

PlaceholderTextColor="#4c566a"
WarningColor="#bf616a"

LoginButtonTextColor="#2e3440"
LoginButtonBackgroundColor="#88c0d0"
SystemButtonsIconsColor="#eceff4"
SessionButtonTextColor="#eceff4"
VirtualKeyboardButtonTextColor="#eceff4"

DropdownTextColor="#eceff4"
DropdownSelectedBackgroundColor="#3b4252"
DropdownBackgroundColor="#2e3440"

HighlightTextColor="#2e3440"
HighlightBackgroundColor="#88c0d0"
HighlightBorderColor="#88c0d0"

HoverUserIconColor="#81a1c1"
HoverPasswordIconColor="#81a1c1"
HoverSystemButtonsIconsColor="#81a1c1"
HoverSessionButtonTextColor="#81a1c1"
HoverVirtualKeyboardButtonTextColor="#81a1c1"

#################### Form ####################

PartialBlur="false"
FullBlur=""
BlurMax=""
Blur=""
HaveFormBackground="false"
FormPosition="center"

#################### Virtual Keyboard ####################

VirtualKeyboardPosition="center"

#################### Interface Behavior ####################

HideVirtualKeyboard="false"
HideSystemButtons="false"
HideLoginButton="false"
UseRealName="true"
ForceLastUser="true"
PasswordFocus="true"
HideCompletePassword="true"
AllowEmptyPassword="false"
BypassSystemButtonsChecks="false"
RightToLeftLayout="false"

#################### Translation ####################

TranslatePlaceholderUsername=""
TranslatePlaceholderPassword=""
TranslateLogin=""
TranslateLoginFailedWarning=""
TranslateCapslockWarning=""
TranslateSuspend=""
TranslateHibernate=""
TranslateReboot=""
TranslateShutdown=""
TranslateSessionSelection=""
TranslateVirtualKeyboardButtonOn=""
TranslateVirtualKeyboardButtonOff=""
