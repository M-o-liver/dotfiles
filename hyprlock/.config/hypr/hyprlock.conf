background {
    path = ~/.local/share/backgrounds/dotfiles-wallpaper.png
    blur_passes = 2
    blur_size = 6
}

input-field {
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(a78bfaee)
    inner_color = rgba(211d2ee6)
    font_color = rgb(224, 222, 244)
    fade_on_empty = false
    placeholder_text = <span foreground="##6b6382">Password...</span>
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(224, 222, 244, 1.0)
    font_size = 64
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(167, 139, 250, 1.0)
    font_size = 20
    position = 0, 60
    halign = center
    valign = center
}
