background {
    path = ~/.local/share/backgrounds/dotfiles-wallpaper.png
    blur_passes = 2
    blur_size = 6
}

input-field {
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(88c0d0ee)
    inner_color = rgba(3b4252e6)
    font_color = rgb(236, 239, 244)
    fade_on_empty = false
    placeholder_text = <span foreground="##4c566a">Password...</span>
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(236, 239, 244, 1.0)
    font_size = 64
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(136, 192, 208, 1.0)
    font_size = 20
    position = 0, 60
    halign = center
    valign = center
}
