\

# Machine: AMD Raphael iGPU (drives eDP panel) + NVIDIA RTX 5070 Max-Q (dGPU, offload only)
# Panel is hardwired to the AMD GPU -- Hyprland must run on AMD; NVIDIA is used
# per-app via PRIME render offload (see ~/dotfiles/hyprland/.config/hypr/scripts/dgpu-run).

# --- GPU / renderer ---
# Force Aquamarine (Hyprland's backend) to pick the AMD device first.
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = LIBVA_DRIVER_NAME,radeonsi

# Qt 6.9+ WebEngine (Chromium) has a known black-video-on-play bug on AMD
# GPUs under Wayland; this is the documented workaround (qutebrowser).
env = QTWEBENGINE_FORCE_USE_GBM,0

# --- Monitor ---
# BOE NE180QDM-NZ4, 2560x1600 native @ 240Hz (confirmed via `hyprctl monitors`).
# Scale MUST be 1.6, not 1.5: 2560/1.6=1600 and 1600/1.6=1000 (clean integer
# logical resolution). 1.5 gives 1706.67x1066.67, a fractional logical size
# that caused a cropped strip on the right edge of the panel.
monitor = eDP-1,2560x1600@240,0x0,1.6

# --- Programs ---
$terminal = ghostty
$fileManager = nautilus
$menu = wofi --show drun

exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(a78bfaee) rgba(4ade80ee) 45deg
    col.inactive_border = rgba(3a2f4daa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.95
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

dwindle {
    preserve_split = true
}

# 3-finger touchpad swipe switches workspaces
gesture = 3, horizontal, workspace

# --- Workspaces ---
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

# --- Keybindings ---
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exec, $terminal -e yazi
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen,
bind = $mainMod, L, exec, hyprlock

# Focus movement (vim-style + arrows)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media / brightness / volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

